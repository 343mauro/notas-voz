<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e1e2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Nota de voz</title>
<style>
  body { margin:0; font-family:sans-serif; background:#1e1e2e; color:#eee;
         display:flex; flex-direction:column; align-items:center;
         padding:12px calc(12px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
         min-height:100vh; box-sizing:border-box; }
  #estado { font-size:21px; font-weight:bold; margin:6px 0; min-height:28px; text-align:center; }
  #estado.grabando { color:#f87171; }
  #estado.pausa { color:#fbbf24; }
  #estado.ok { color:#4ade80; }
  #timer { font-size:50px; font-weight:bold; color:#f87171; min-height:58px;
           visibility:hidden; font-variant-numeric:tabular-nums; }
  #texto { width:100%; flex:1; min-height:13vh; font-size:19px; border-radius:14px; border:none;
           padding:12px; box-sizing:border-box; background:#2a2a3c; color:#eee; }
  button { width:100%; border:none; border-radius:18px; color:#fff; font-weight:bold;
           margin-top:12px; padding:24px 0; font-size:25px;
           -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; touch-action:manipulation; }
  button:disabled { opacity:.45; }
  #btnGrabar { background:#7c3aed; }
  #btnGrabar.rec { background:#dc2626; animation:p 1.2s infinite; }
  #btnGrabar.pausa { background:#d97706; animation:none; }
  @keyframes p { 50% { opacity:.7; } }
  #btnGuardar { background:#16a34a; padding:30px 0; font-size:28px; }
  #ayuda { margin-top:8px; font-size:12px; color:#8a8aa5; text-align:center; min-height:16px; }
  #version { margin-top:4px; font-size:12px; color:#6b6b85; }
</style>
</head>
<body>
  <div id="estado">Tocá GRABAR y hablá</div>
  <div id="timer">00:00</div>
  <textarea id="texto" placeholder="...o escribí/dictá acá con el teclado y tocá GUARDAR."></textarea>
  <button id="btnGuardar">💾 GUARDAR NOTA</button>
  <button id="btnGrabar">🎤 GRABAR</button>
  <div id="ayuda"></div>
  <div id="version"></div>

<script>
  // ===== CONFIGURACIÓN =====
  const VERSION = 'v2.2';
  const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzv6R8TVWWnaEyePZr5HOCwXFcycW993QNsz5k5vBujdvaGCy-5vpr7tZvY56WOvtzz/exec';
  const TROZO_MS = 60 * 1000;     // la grabación se parte en bloques de 1 minuto
  const ESPACIADO_MS = 6000;      // pausa entre subidas para respetar el límite gratuito de Gemini
  const MAX_INTENTOS = 5;         // reintentos de un bloque con error antes de mandarlo al final
  const DESCARTE_MS = 3000;       // mantener pulsado este tiempo descarta la nota

  // La clave NO va en el código público: llega una vez en el enlace (#clave) y queda guardada en el teléfono.
  if (location.hash.length > 1) {
    localStorage.setItem('token', location.hash.slice(1));
    history.replaceState(null, '', location.pathname);
  }
  const TOKEN = localStorage.getItem('token') || '';

  const txt = document.getElementById('texto');
  const est = document.getElementById('estado');
  const timerEl = document.getElementById('timer');
  const btnGrabar = document.getElementById('btnGrabar');
  const btnGuardar = document.getElementById('btnGuardar');
  const ayuda = document.getElementById('ayuda');
  document.getElementById('version').textContent = VERSION;

  let grabando = false, pausado = false, descartando = false, mediaStream = null, recorder = null, corteTimeout = null;
  let sesionId = '', parte = 0, t0 = 0, acumuladoMs = 0, timerInt = null, wakeLock = null, enviando = false, mostrarProgreso = false;

  function setEstado(msg, clase) { est.textContent = msg; est.className = clase || ''; }
  function esperar(ms) { return new Promise(r => setTimeout(r, ms)); }
  function mostrarTimer() {
    const ms = acumuladoMs + (grabando ? Date.now() - t0 : 0);
    const s = Math.floor(ms / 1000);
    timerEl.textContent = String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }

  // ===== COLA PERSISTENTE (IndexedDB): sobrevive cierres y falta de señal =====
  function abrirDB() {
    return new Promise((res, rej) => {
      const r = indexedDB.open('notas-voz', 1);
      r.onupgradeneeded = () => r.result.createObjectStore('cola', { keyPath: 'id', autoIncrement: true });
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
  function txCola(modo) { return abrirDB().then(d => d.transaction('cola', modo).objectStore('cola')); }
  async function encolar(item) {
    const st = await txCola('readwrite');
    return new Promise((res, rej) => { const q = st.add(item); q.onsuccess = res; q.onerror = () => rej(q.error); });
  }
  async function colaPendiente() {
    const st = await txCola('readonly');
    return new Promise((res, rej) => { const q = st.getAll(); q.onsuccess = () => res(q.result); q.onerror = () => rej(q.error); });
  }
  async function quitarDeCola(id) {
    const st = await txCola('readwrite');
    return new Promise((res, rej) => { const q = st.delete(id); q.onsuccess = res; q.onerror = () => rej(q.error); });
  }
  async function actualizarEnCola(item) {
    const st = await txCola('readwrite');
    return new Promise((res, rej) => { const q = st.put(item); q.onsuccess = res; q.onerror = () => rej(q.error); });
  }
  async function moverAlFinal(item) {
    const copia = Object.assign({}, item); delete copia.id;
    await encolar(copia);
    await quitarDeCola(item.id);
  }
  // Borra de la cola los bloques (y el fin) de una sesión descartada que no subieron.
  async function borrarSesionDeCola(sesion) {
    const items = await colaPendiente();
    for (const it of items) {
      if ((it.tipo === 'audio' || it.tipo === 'fin') && it.sesion === sesion) await quitarDeCola(it.id);
    }
  }

  function cuerpoDe(it) {
    if (it.tipo === 'audio')     return { token: TOKEN, accion: 'audio', sesion: it.sesion, parte: it.parte, mime: it.mime, audio: it.datos };
    if (it.tipo === 'fin')       return { token: TOKEN, accion: 'fin', sesion: it.sesion };
    if (it.tipo === 'descartar') return { token: TOKEN, accion: 'descartar', sesion: it.sesion };
    return { token: TOKEN, texto: it.texto };
  }

  // Drena la cola en orden. El feedback se controla con la bandera global
  // mostrarProgreso, así el aviso final "✔ Guardada" aparece aunque la subida
  // la haya arrancado un drenado de segundo plano.
  async function drenarCola() {
    if (enviando) return;
    enviando = true;
    let vueltas = 0;
    try {
      let items = await colaPendiente();
      while (items.length && vueltas++ < 1000) {
        let it = items[0];
        if (it.tipo === 'fin' && items.length > 1) { await moverAlFinal(it); items = await colaPendiente(); continue; }

        const reales = items.filter(x => x.tipo === 'audio' || x.tipo === 'texto').length;
        if (mostrarProgreso) setEstado(reales > 0
          ? 'Guardando... (queda' + (reales > 1 ? 'n ' + reales + ' partes)' : ' 1 parte)')
          : 'Cerrando nota...');

        let resp;
        try {
          const r = await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(cuerpoDe(it)) });
          resp = await r.text();
        } catch (errRed) {
          if (mostrarProgreso) setEstado('📡 Sin conexión: queda en el teléfono, se envía solo al recuperar señal', 'ok');
          break;
        }

        if (resp === 'ok' || resp === 'vacío') {
          await quitarDeCola(it.id);
          items = await colaPendiente();
          if (items.length) await esperar(ESPACIADO_MS);
        } else if (resp === 'rate-limit') {
          if (mostrarProgreso) setEstado('Procesando... (Gemini ocupado, reintento en unos segundos)');
          await esperar(15000);
        } else {
          it.intentos = (it.intentos || 0) + 1;
          if (it.intentos >= MAX_INTENTOS) { await moverAlFinal(it); }
          else { await actualizarEnCola(it); await esperar(8000); }
          items = await colaPendiente();
        }
      }
      const quedan = await colaPendiente();
      if (mostrarProgreso && quedan.length === 0) { setEstado('✔ Guardada en tu vault', 'ok'); mostrarProgreso = false; }
    } finally {
      enviando = false;
    }
  }

  function aBase64(blob) {
    return new Promise((res, rej) => {
      const fr = new FileReader();
      fr.onload = () => res(fr.result.split(',')[1]);
      fr.onerror = () => rej(fr.error);
      fr.readAsDataURL(blob);
    });
  }

  // ===== GRABACIÓN DE AUDIO (sin beeps: no usa el reconocedor del sistema) =====
  const tipoAudio = (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm;codecs=opus'))
    ? 'audio/webm' : '';

  function pintarBoton() {
    btnGrabar.classList.toggle('rec', grabando);
    btnGrabar.classList.toggle('pausa', pausado);
    btnGrabar.textContent = grabando ? '⏺ GRABANDO' : (pausado ? '▶ CONTINUAR' : '🎤 GRABAR');
    ayuda.textContent = (grabando || pausado) ? 'Tocá para pausar · mantené 3 s para descartar' : '';
  }

  async function empezar() {
    try { mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch (e) { setEstado('Permití el micrófono y tocá GRABAR'); return; }
    grabando = true; pausado = false; descartando = false; mostrarProgreso = false;
    sesionId = Date.now().toString(36) + Math.floor(Math.random() * 1000);
    parte = 0; acumuladoMs = 0; t0 = Date.now();
    pintarBoton();
    setEstado('Hablá tranquilo — tocá GUARDAR al terminar', 'grabando');
    mostrarTimer(); timerEl.style.visibility = 'visible';
    timerInt = setInterval(mostrarTimer, 1000);
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    nuevoTramo();
  }

  function nuevoTramo() {
    const opciones = tipoAudio ? { mimeType: 'audio/webm;codecs=opus', audioBitsPerSecond: 32000 } : {};
    recorder = new MediaRecorder(mediaStream, opciones);
    const trozos = [];
    recorder.ondataavailable = (e) => { if (e.data.size) trozos.push(e.data); };
    recorder.onstop = async () => {
      if (descartando) { // nota descartada: no guardar el último bloque ni cerrar con 'fin'
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }
      const blob = new Blob(trozos, { type: recorder.mimeType || 'audio/webm' });
      if (blob.size > 0) {
        parte++;
        await encolar({ tipo: 'audio', sesion: sesionId, parte: parte, mime: blob.type, datos: await aBase64(blob) });
      }
      if (grabando) { nuevoTramo(); drenarCola(); }            // sigue grabando
      else if (pausado) { drenarCola(); }                      // en pausa: subir lo grabado, mantener micrófono
      else {                                                    // finalizar de verdad
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        await encolar({ tipo: 'fin', sesion: sesionId });
        drenarCola();
      }
    };
    recorder.start();
    corteTimeout = setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, TROZO_MS);
  }

  function pausar() {
    if (!grabando) return;
    acumuladoMs += Date.now() - t0;
    grabando = false; pausado = true;
    clearTimeout(corteTimeout); clearInterval(timerInt);
    pintarBoton();
    setEstado('⏸ En pausa — tocá CONTINUAR', 'pausa');
    if (recorder && recorder.state === 'recording') recorder.stop(); // corta el bloque actual
  }

  function reanudar() {
    if (!pausado) return;
    grabando = true; pausado = false; mostrarProgreso = false;
    t0 = Date.now();
    pintarBoton();
    setEstado('Hablá tranquilo — tocá GUARDAR al terminar', 'grabando');
    timerInt = setInterval(mostrarTimer, 1000);
    nuevoTramo();
  }

  function finalizar() {
    if (!grabando && !pausado) return;
    if (grabando) acumuladoMs += Date.now() - t0;
    grabando = false; pausado = false; mostrarProgreso = true;
    clearTimeout(corteTimeout); clearInterval(timerInt);
    timerEl.style.visibility = 'hidden';
    pintarBoton();
    setEstado('Transcribiendo y guardando...');
    if (recorder && recorder.state === 'recording') {
      recorder.stop(); // onstop hará el 'fin' porque grabando/pausado ya son false
    } else {
      // estaba en pausa (sin grabador activo): cerrar a mano
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      encolar({ tipo: 'fin', sesion: sesionId }).then(() => drenarCola());
    }
  }

  async function descartar() {
    const sesion = sesionId;
    descartando = true; grabando = false; pausado = false; mostrarProgreso = false;
    clearTimeout(corteTimeout); clearInterval(timerInt);
    timerEl.style.visibility = 'hidden';
    if (recorder && recorder.state === 'recording') {
      try { recorder.stop(); } catch (e) {} // onstop verá descartando=true: no guarda nada
    } else {
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }
    pintarBoton();
    setEstado('🗑 Nota descartada', 'ok');
    await borrarSesionDeCola(sesion);                  // saca los bloques no subidos de esta nota
    await encolar({ tipo: 'descartar', sesion: sesion }); // y anula en el servidor lo que ya hubiera subido
    drenarCola();
  }

  // Tap = pausar/continuar/empezar. Mantener pulsado = descartar.
  let pressTimer = null, longPressFired = false;
  btnGrabar.addEventListener('pointerdown', () => {
    if (grabando || pausado) {
      longPressFired = false;
      ayuda.textContent = 'Seguí apretando para descartar...';
      pressTimer = setTimeout(() => { longPressFired = true; descartar(); }, DESCARTE_MS);
    }
  });
  function cancelarPress() { clearTimeout(pressTimer); pintarBoton(); }
  btnGrabar.addEventListener('pointerup', cancelarPress);
  btnGrabar.addEventListener('pointercancel', cancelarPress);
  btnGrabar.addEventListener('pointerleave', cancelarPress);
  btnGrabar.onclick = () => {
    if (longPressFired) { longPressFired = false; return; } // fue descarte, no tap
    if (grabando) pausar();
    else if (pausado) reanudar();
    else empezar();
  };

  btnGuardar.onclick = async () => {
    if (grabando || pausado) { finalizar(); return; }
    const t = txt.value.trim();
    if (!t) { setEstado('No hay nada que guardar'); return; }
    btnGuardar.disabled = true;
    mostrarProgreso = true;
    await encolar({ tipo: 'texto', texto: t });
    txt.value = '';
    await drenarCola();
    btnGuardar.disabled = false;
  };

  window.addEventListener('beforeunload', (e) => {
    if (grabando || pausado) { e.preventDefault(); e.returnValue = ''; }
  });

  // ===== AL ABRIR =====
  if (!TOKEN) {
    setEstado('Falta la clave: abrí la app con el enlace completo que te pasó Claude');
    btnGuardar.disabled = true;
    btnGrabar.disabled = true;
  } else {
    (async () => {
      const items = await colaPendiente();
      if (items.length) { mostrarProgreso = true; setEstado('Enviando lo que quedó pendiente...'); drenarCola(); }
    })();
  }

  window.addEventListener('online', () => { if (!grabando && !pausado) { mostrarProgreso = true; drenarCola(); } });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
